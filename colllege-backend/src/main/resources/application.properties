spring.application.name=colllege-backend

# Database Configuration
# Make sure MySQL server is running and the database exists
# You can create it with: CREATE DATABASE college_db;
spring.datasource.url=jdbc:mysql://localhost:3306/college_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&allowZeroDateTime=true&zeroDateTimeBehavior=convertToNull
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration for Auto Table Creation
# ddl-auto values: none, validate, update, create, create-drop
# update: Create tables if they don't exist, update schema if needed
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Server Configuration
server.port=8080
server.servlet.multipart.max-file-size=10MB
server.servlet.multipart.max-request-size=50MB

# File Upload Configuration
file.upload.dir=uploads

# DevTools (for development - auto-restart on file changes)
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/java

# Logging
logging.level.root=INFO
logging.level.com.college.colllege_backend=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Spring Security - Default credentials for development
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN